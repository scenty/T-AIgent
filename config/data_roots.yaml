roots:
  - path: ./data/dailyforecast/AutoWave/res_EC
    description: 海浪时空场（AutoWave，EC 驱动）
    element: wave
    product_type: field_ai
    layout:
      access_mode: grid
      coord_level: variable
    variables:
      wave: [hs_torch, mwp_torch, mwd_torch, uwind_torch, vwind_torch]

  - path: ./data/dailyforecast/storm_surge_for_spatiotemporal
    description: 风暴潮时空场（surge_predicted_*.nc）
    element: surge
    product_type: field_ai
    layout:
      access_mode: grid
      coord_level: variable
    variables:
      surge: [surge]

  - path: ./data/dailyforecast/storm_surge_point_system/nc_file
    description: 风暴潮单点（CWU/DSN/JNJ/XMN 等站点）
    element: surge
    product_type: point_ai
    layout:
      access_mode: grid_1x1
      coord_level: variable
      filename_pattern: "storm_surge_forecast_sp_{station_code}_*.nc"
    variables:
      surge: [storm_surge]

  - path: ./data/dailyforecast/wave_for_single_point/outputs/nc_files
    description: 海浪单点（按日起报，EC_point_wave_*.nc）
    element: wave
    product_type: point_ai
    layout:
      access_mode: time_series
      coord_level: file
      filename_pattern: "EC_point_wave_{station_code}_*.nc"
    variables:
      wave: [swh, mwp, mwd]

  - path: ./data/EC_wind
    description: EC 融合风场（ECMWF_wind_msl.nc）
    element: wind
    product_type: large_grid
    layout:
      access_mode: grid
      coord_level: variable
    variables:
      wind: [u10, v10, msl]

scan:
  extensions:
    - .nc
    - .nc4
  exclude_patterns:
    - "**/tmp/**"
    - "**/.cache/**"

grid_threshold: 100
